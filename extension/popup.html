<!DOCTYPE html>
<html>

<!--
  popup.html
  Popup UI for the Chrome Theme Switcher extension.

  This file defines the popup interface shown when the extension icon is clicked.
  Buttons in this file are referenced in popup.js using their element IDs.
-->

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: sans-serif;
            font-size: medium;
            padding: 15px;
            width: 250px;
            background: #f2f2f7;
        }

        h3 {
            font-size: 13px;
            font-weight: 600;
            color: #6e6e73;
            letter-spacing: 0.3px;
            margin-bottom: 10px;
            padding-left: 2px;
            text-align: center;
        }

        button {
            width: 100%;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            background: #ffffff;
            font-size: 15px;
            color: #1d1d1f;
        }

        button:hover {
            background: #f5f5f7;
        }

        button:active {
            background: #e5e5ea;
        }

        button:disabled{
            color: #c7c7cc;
            background: #f5f5f7;
            cursor: default;
        }

        .theme-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .theme-row button:first-child {
            flex: 1;
            margin-bottom: 0;
        }

        .clear-btn {
            width: 32px;
            padding: 8px 0;
            margin-bottom: 0;
            flex: 0 0 32px;
            color: #ff3b30;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h3>THEME TOGGLE<br>by 404 Team Not Found</h3>

    <button id="defaultBtn">Default</button>
    <button id="userBtn">User Theme</button>

    <div class="theme-row">
        <button id="firstBtn">First</button>
        <button id="clearFirstBtn" class="clear-btn" title="Clear saved first theme">×</button>
    </div>

    <div class="theme-row">
        <button id="secondBtn">Second</button>
        <button id="clearSecondBtn" class="clear-btn" title="Clear saved second theme">×</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
