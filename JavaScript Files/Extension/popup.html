<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>   
    <div class = "container">
        <div class = "tab">
        <h3 class="active">Main</h3>
        <h3>Create</h3>
        <h3>Download</h3> 
        </div>
    </div>

    <div class = "tab-content">
        <div class = "active">
            <div>
                <p class="box_cool"> Frame: </p>     <input type="color" id="frameColor" name="frameColor" value="#000000" class="rounded fillWidth">
            </div>
            <div>
                <p class="box_cool"> Frame while inactive: </p>     <input type="color" id="frameColorInactive" name="frameColorInactive" value="#000000" class="rounded fillWidth">
            </div>
            <div>
                <p class="box_cool"> Toolbar: </p>     <input type="color" id="toolbarColor" name="toolbarColor" value="#000000" class="rounded fillWidth">
            </div>
            <div>
                <p class="box_cool"> Tab Text: </p>     <input type="color" id="tabTextColor" name="tabTextColor" value="#000000" class="rounded fillWidth">
            </div>
            <div>
                <p class="box_cool"> Tab Text while inactive: </p>     <input type="color" id="tabTextColorInactive" name="tabTextColorInactive" value="#000000" class="rounded fillWidth">
            </div>
            <div>
                <p class="box_cool"> Bookmark Text: </p>     <input type="color" id="bookmarkTextColor" name="bookmarkTextColor" value="#000000" class="rounded fillWidth">
            </div>
            <div>
                <p class="box_cool"> New Tab Page Text Color: </p>     <input type="color" id="newTabTextColor" name="newTabTextColor" value="#000000" class="rounded fillWidth">
            </div>
            <div>
                <p class="box_cool"> Background Photo: </p>    <button id="backgroundButton" class="fillWidth rounded">Upload Image</button>
            </div>
            <div class="element">
                <button id="applyButton" class="fillWidth rounded">Create Theme</button>   
            </div>
        </div>
        <div>
            <p class="box_cool"> yo mama </p>
        </div>
    </div>




  

    
    
    
</body>

<script src="popup.js"></script>


</html>
